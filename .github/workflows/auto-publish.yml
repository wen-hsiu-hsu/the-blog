name: Auto Publish Scheduled Posts

on:
    schedule:
        # 每小時執行一次（台北時區早上 8 點到晚上 11 點）
        - cron: '0 0-15 * * *' # UTC 時間，對應台北時間 8:00-23:00
    workflow_dispatch: # 允許手動觸發

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm ci

            - name: Run publish script
              run: node .github/scripts/publish-posts.js
              env:
                  TZ: 'Asia/Taipei'

            - name: Commit and push if changed
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add .
                  if git diff --staged --quiet; then
                    echo "No posts to publish"
                  else
                    git commit -m "chore: auto-publish scheduled posts"
                    git push
                  fi
