name: Auto Publish Scheduled Posts

on:
    schedule:
        # 每天台北時間早上 8 點執行一次
        - cron: '0 0 * * *' # UTC 00:00 = 台北時間 08:00
    workflow_dispatch: # 允許手動觸發

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            actions: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Install dependencies
              run: npm install

            - name: Run publish script
              id: publish
              run: node .github/scripts/publish-posts.js
              env:
                  TZ: 'Asia/Taipei'

            - name: Cancel run if nothing published
              if: steps.publish.outputs.published_count == '0'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh run cancel ${{ github.run_id }}

            - name: Commit and push if changed
              if: steps.publish.outputs.published_count != '0'
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add .
                  if git diff --staged --quiet; then
                    echo "No posts to publish"
                  else
                    git commit -m "chore: auto-publish scheduled posts"
                    git push
                  fi

